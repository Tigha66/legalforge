<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#818cf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegalForge - Legal Automation Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
    .gradient-text{background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  </style>
</head>
<body class="bg-[#0a0a0f] min-h-screen text-white">
  <header class="glass sticky top-0">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
          <i class="fas fa-gavel text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold gradient-text">LegalForge</h1>
          <p class="text-xs text-slate-400">Legal Automation Studio</p>
        </div>
      </div>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-8 py-10">
    <div class="grid grid-cols-4 gap-6 mb-10">
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Contracts</p><p class="text-4xl font-bold">247</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Reviewed</p><p class="text-4xl font-bold">189</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Pending</p><p class="text-4xl font-bold text-yellow-400">12</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Time Saved</p><p class="text-4xl font-bold">48h</p></div>
    </div>
    <div class="grid lg:grid-cols-3 gap-8">
      <div class="glass rounded-2xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-magic text-indigo-400 mr-3"></i>Contract Generator</h2>
        <div class="space-y-4">
          <select class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white">
            <option>NDA Agreement</option>
            <option>Employment Contract</option>
            <option>Service Agreement</option>
          </select>
          <input placeholder="Enter party names..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-slate-500">
          <button class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl font-semibold"><i class="fas fa-wand-magic-sparkles mr-2"></i>Generate Contract</button>
        </div>
      </div>
      <div class="col-span-2 glass rounded-2xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-folder-open text-purple-400 mr-3"></i>Recent Contracts</h2>
        <div class="space-y-3">
          <div class="bg-white/5 rounded-xl p-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-indigo-500/20 flex items-center justify-center"><i class="fas fa-file-contract text-indigo-400"></i></div>
              <div><p class="font-semibold">NDA - Acme Corporation</p><p class="text-slate-400 text-sm">NDA • Ready</p></div>
            </div>
            <span class="px-4 py-2 rounded-lg text-sm bg-green-500/20 text-green-400">Ready</span>
          </div>
          <div class="bg-white/5 rounded-xl p-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center"><i class="fas fa-file-contract text-purple-400"></i></div>
              <div><p class="font-semibold">Employment - John Smith</p><p class="text-slate-400 text-sm">Employment • Review</p></div>
            </div>
            <span class="px-4 py-2 rounded-lg text-sm bg-yellow-500/20 text-yellow-400">Review</span>
          </div>
          <div class="bg-white/5 rounded-xl p-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center"><i class="fas fa-file-contract text-blue-400"></i></div>
              <div><p class="font-semibold">Service Agreement - Tech Corp</p><p class="text-slate-400 text-sm">Service • Draft</p></div>
            </div>
            <span class="px-4 py-2 rounded-lg text-sm bg-blue-500/20 text-blue-400">Draft</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</html>
